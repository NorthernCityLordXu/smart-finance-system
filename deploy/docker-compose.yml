version: '3.8'

services:
  # 1. 数据库集装箱
  db:
    image: mysql:8.0
    container_name: finance_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password_123
      MYSQL_DATABASE: finance_db
    ports:
      - "3306:3306"
    volumes:
      - ./mysql_data:/var/lib/mysql

  # 2. AI 算法集装箱
  algorithm:
    build: ../algorithm   # 根据上一层的 algorithm 文件夹里的 Dockerfile 打包
    container_name: finance_algorithm
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db                # 等数据库启动后再启动

  # 3. Java 后端集装箱
  backend:
    # 🌟 核心修改点：构建路径精准指向了包含 pom.xml 的那一层！
    build: ../backend/smart-finance-backend
    container_name: finance_backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      # 云原生魔法：用环境变量强行把 Java 里的 localhost 替换成 db 容器名
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/finance_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root_password_123
    depends_on:
      - db
      - algorithm

  # 4. Vue 前端集装箱
  frontend:
    build: ../frontend    # 根据上一层的 frontend 文件夹里的 Dockerfile 打包
    container_name: finance_frontend
    restart: always
    ports:
      - "80:80"           # 映射到本机的 80 端口，以后直接输 localhost 就能访问！
    depends_on:
      - backend